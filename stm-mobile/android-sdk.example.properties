# Used as android/local.properties (gitignored). Expo prebuild may generate one; Gradle needs sdk.dir.

# ── Windows-friendly setup (pick one)
# A) Persist for all terminals (new window required after setx):
#    setx ANDROID_HOME "%LOCALAPPDATA%\Android\Sdk"
# B) Paste one line below (forward slashes). Escape ':' as '\:' — example:
#
# sdk.dir=C\:/Users/YourName/AppData/Local/Android/Sdk

# ── Automated (recommended after `npx expo prebuild --platform android`):
# From stm-mobile/:  npm run android:write-local-properties
# Writes android/local.properties from ANDROID_HOME → default local AppData SDK.

sdk.dir=REPLACE_ME_OR_USE_ANDROID_WRITE_LOCAL_PROPERTIES
